# .github/workflows/manual-release.yml
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to release (default: latest main branch commit)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Recommended version
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Version must follow semantic versioning format (e.g., 1.2.3)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          npm version ${{ env.VERSION }} --no-git-tag-version
          npm install # Ensures package-lock.json is also updated

      # Build and Zip using the VERSION variable for consistency
      - name: Build and Zip Assets
        run: |
          # 1. Production Pure
          npm run build -- --c productive-pure
          zip -r release-productive-pure-${{ env.VERSION }}.zip dist/
          
          # 2. QA Pure Dev
          npm run build -- --c qa-pure-dev
          zip -r release-qa-pure-dev-${{ env.VERSION }}.zip dist/
          
          # 3. QA Pure
          npm run build -- --c qa-pure
          zip -r release-qa-pure-${{ env.VERSION }}.zip dist/
          
      - name: Generate Conventional Changelog
        id: build_changelog
        run: |
          npm install conventional-changelog-cli
          
          # Generate the full changelog. 
          # -r 0 ensures it regenerates the full history or handles the current unreleased version properly
          npx conventional-changelog -p angular -i CHANGELOG.md -s -r 0
          
          # Extract only the top section (the newest version) for the GitHub Release body
          # Looks for the first occurrence of a version header and captures until the next one
          sed -n '/^#/,/^#/{/^#/!p;}' CHANGELOG.md > release_notes.md
          
          # If the file is empty (common if no conventional commits found), add a fallback
          if [ ! -s release_notes.md ]; then
            echo "Manual release for version ${{ env.VERSION }}" > release_notes.md
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ env.VERSION }}"
          # Push directly using git to avoid extra action overhead
          git push origin HEAD:main

      - name: Create GitHub Release, Upload Assets and add Changelog
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: ${{ steps.build_changelog.outputs.changelog_path }}
          draft: false
          prerelease: false
          # Use wildcards to catch all zips created above
          files: |
            release-*-${{ env.VERSION }}.zip
            with:
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
