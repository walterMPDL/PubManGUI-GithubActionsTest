# .github/workflows/manual-release.yml
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to release (default: latest main branch commit)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits and create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Version must follow semantic versioning format (e.g., 1.2.3)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          npm version ${{ env.VERSION }} --no-git-tag-version
          echo "Updated package.json to version ${{ env.VERSION }}"

      - name: Install dependencies
        run: npm install

      # 1. Build and Package: Production Pure
      - name: Build Production Pure
        run: npm run build -- --c productive-pure
      
      - name: Zip Production Asset
        run: zip -r release-asset-${{ github.ref_name }}-productive-pure.zip dist/

      # 2. Build and Package: QA Pure Dev
      - name: Build QA Pure Dev
        run: npm run build -- --c qa-pure-dev
      
      - name: Zip QA Pure Dev Asset
        run: zip -r release-asset-${{ github.ref_name }}-qa-pure-dev.zip dist/

      # 3. Build and Package: QA Pure
      - name: Build QA Pure
        run: npm run build -- --c qa-pure
      
      - name: Zip QA Pure Asset
        run: zip -r release-asset-${{ github.ref_name }}-qa-pure.zip dist/

      # 4. Upload all Zips to the Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-asset-*-productive-pure.zip
            release-asset-*-qa-pure-dev.zip
            release-asset-*-qa-pure.zip

      - name: Commit package-lock.json and package.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ env.VERSION }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            release-assets-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
