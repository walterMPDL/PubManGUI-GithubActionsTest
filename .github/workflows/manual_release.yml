# .github/workflows/manual-release.yml
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to release (default: latest main branch commit)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Version must follow semantic versioning format (e.g., 1.2.3)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          npm version ${{ env.version }} --no-git-tag-version
          echo "Updated package.json to version ${{ env.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build for production-pure
        run: npm run build:production-pure

      - name: Build for qa-pure-dev
        run: npm run build:qa-pure-dev

      - name: Build for qa-pure
        run: npm run build:qa-pure

      - name: Commit package-lock.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-lock.json
          git commit -m "chore: update package-lock.json for ${{ env.version }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.version }}
          release_name: ${{ env.version }}
          draft: false
          prerelease: false
