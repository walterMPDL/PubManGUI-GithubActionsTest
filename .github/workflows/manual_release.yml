# .github/workflows/manual-release.yml
name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA to release (default: latest main branch commit)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Recommended version
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Error: Version must follow semantic versioning format (e.g., 1.2.3)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          npm version ${{ env.VERSION }} --no-git-tag-version
          npm install # Ensures package-lock.json is also updated

      # Build and Zip using the VERSION variable for consistency
      - name: Build and Zip Assets
        run: |
          # 1. Production Pure
          npm run build -- --c productive-pure
          zip -r release-productive-pure-${{ env.VERSION }}.zip dist/
          
          # 2. QA Pure Dev
          npm run build -- --c qa-pure-dev
          zip -r release-qa-pure-dev-${{ env.VERSION }}.zip dist/
          
          # 3. QA Pure
          npm run build -- --c qa-pure
          zip -r release-qa-pure-${{ env.VERSION }}.zip dist/
          
      - name: Generate Conventional Changelog
        id: build_changelog
        run: |
          npm install conventional-changelog-cli
          
          # 1. Update the CHANGELOG.md file permanently
          # We use -u to specify that the 'upcoming' version is the one we just set
          npx conventional-changelog -p angular -i CHANGELOG.md -s -u ${{ env.VERSION }}
          
          # 2. Generate ONLY the delta for the GitHub Release Body
          # This specifically asks for the changes between the last tag and current HEAD
          npx conventional-changelog -p angular -r 1 -u ${{ env.VERSION }} > release_notes.md
          
          # Debug: Show what was generated
          echo "--- Generated Release Notes ---"
          cat release_notes.md
          echo "-------------------------------"

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          # Add CHANGELOG.md to the commit!
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release ${{ env.VERSION }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          # Point to the file created in the changelog step
          body_path: release_notes.md
          files: |
            release-*-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
