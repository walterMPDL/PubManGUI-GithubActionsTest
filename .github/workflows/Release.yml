
# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - '^(\d+\.\d+\.\d)+(-.+)?'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=$(echo "$TAG_NAME" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)(-.+)?$/\1/')
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "tag_name=$TAG_NAME" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version
        run: |
          npm version ${{ env.version }} --no-git-tag-version
          echo "Updated package.json to version ${{ env.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Build for production-pure
        run: npm run build:production-pure

      - name: Build for qa-pure-dev
        run: npm run build:qa-pure-dev

      - name: Build for qa-pure
        run: npm run build:qa-pure

      - name: Commit package-lock.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package-lock.json
          git commit -m "chore: update package-lock.json for ${{ env.version }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ env.version }}
          draft: false
          prerelease: false
